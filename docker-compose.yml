# steam-stream: single-container Moonlight host
services:
  steam-stream:
    image: local/steam-stream:latest
    container_name: steam-stream
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host

    devices:
      - nvidia.com/gpu=all
      - /dev/uinput:/dev/uinput
      - /dev/dri:/dev/dri

    device_cgroup_rules:
      - "c 13:* rmw"

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      STEAM_STREAM_RENDER_NODE: /dev/dri/renderD129
      WOLF_RENDER_NODE: /dev/dri/renderD129
      WOLF_USE_ZERO_COPY: "TRUE"
      STEAM_STREAM_ENCODER_CONFIG: /config/encoders.toml
    group_add:
      - "989"   # render  -> /dev/dri/renderD128,129
      - "985"   # video   -> /dev/dri/card*
      - "994"   # input   -> /dev/uinput, /dev/input/event*
    shm_size: "2gb"
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    cap_add:
      - SYS_ADMIN
      - SYS_NICE
      - SYS_PTRACE
      - NET_RAW
      - MKNOD
      - NET_ADMIN
    # Steam/CEF use host IPC (shared-memory segments) for the webhelper <-> client transport.
    ipc: host
    ulimits:
      nofile:
        soft: 10240
        hard: 10240

    volumes:
      # Shared Steam login/library + server pairing state, persisted on the host so it's
      # inspectable/backup-able in place (not buried in a Docker named volume).
      - /opt/steam-stream/home:/home/retro
      # Encoder config on the host, editable in place (seeded on first run if absent).
      - ./config:/config
      - /dev/input:/dev/input
      # Game + ROM libraries (read-write so Steam can install; make :ro if you only stream installed games).
      - /mnt/games:/mnt/games
      - /mnt/nas_roms:/mnt/nas_roms
